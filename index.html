<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1024 Game</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./assets/favicon.ico">
    <meta name="description" content="1024游戏 - 合并方块，挑战高分">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="1024 Game - Addicting Puzzle">
    <meta property="og:description"
        content="Join the numbers and get to the 1024 tile! Play the classic 1024 puzzle game online.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://remotemonsters.top/">
    <!-- 确保资源可以加载 -->
    <style>
        /* 备用基础样式，防止CSS加载失败时页面完全没有样式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color, #faf8ef);
            color: var(--text-color, #776e65);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .grid-container {
            background: var(--container-bg, #bbada0);
            border-radius: 8px;
            padding: 12px;
            margin-top: 20px;
        }

        .retry-button {
            display: inline-block;
            background: var(--btn-bg, #8f7a66);
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
    <!-- Clarity tracking code -->
    <script type="text/javascript">
        (function (c, l, a, r, i, t, y) {
            c[a] = c[a] || function () { (c[a].q = c[a].q || []).push(arguments) };
            t = l.createElement(r); t.async = 1; t.src = "https://www.clarity.ms/tag/" + i;
            y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "vqq21od6di");
    </script>
</head>

<body>
    <div class="lights-out-overlay"></div>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>1024</h1>
                <button id="theme-toggle" class="theme-switch" aria-label="Toggle Dark Mode">
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <div class="scores-container">
                <div class="score-box">
                    <span class="score-label" data-i18n="score">Score</span>
                    <span id="score">0</span>
                </div>
                <div class="score-box">
                    <span class="score-label" data-i18n="best">Best</span>
                    <span id="best-score">0</span>
                </div>
            </div>
        </header>

        <div class="game-container">
            <div class="game-message">
                <p></p>
                <div class="lower">
                    <a class="retry-button" data-i18n="retry">Try Again</a>
                </div>
            </div>
            <div class="grid-container">
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="grid-row">
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                    <div class="grid-cell"></div>
                </div>
                <div class="tile-container"></div>
            </div>
        </div>

        <div class="game-explanation">
            <p data-i18n="explanation">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move the tiles.
                Tiles with the same number merge into one when they touch.</p>
        </div>
    </div>
    <script src="./js/i18n.js"></script>
    <script src="./js/game.js"></script>
    <!-- 添加错误处理脚本 -->
    <script>
        window.addEventListener('error', function (e) {
            console.error('资源加载错误:', e.target.src || e.target.href);
        }, true);
    </script>
</body>

</html>
